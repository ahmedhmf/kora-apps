services:

  # ─────────────────────────────────────────────────────────────────────────────
  # PostgreSQL — isolated inside Docker network, NOT exposed to the internet
  # ─────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: survay_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - survay_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No `ports:` — PostgreSQL is only accessible from within the Docker network

  # ─────────────────────────────────────────────────────────────────────────────
  # Node.js API
  # ─────────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: survay_api
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      API_PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - survay_net
    # No `ports:` — API is only accessible through Nginx

  # ─────────────────────────────────────────────────────────────────────────────
  # Nginx — public-facing reverse proxy + Angular static file server
  # ─────────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: survay_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dist/survay-pwa/browser:/usr/share/nginx/html:ro
      - ./nginx/certs:/etc/nginx/certs:ro   # mount Let's Encrypt certs here
    depends_on:
      - api
    networks:
      - survay_net

networks:
  survay_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
