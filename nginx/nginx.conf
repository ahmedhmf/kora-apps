events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Gzip compression for text assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # Hide Nginx version from error pages
    server_tokens off;

    upstream api_backend {
        server api:3000;
        keepalive 32;
    }

    # ─── HTTP server (port 80) — Redirect to HTTPS ────────────────────────────
    server {
        listen 80;
        server_name surveys.korafc.com;

        # Redirect all HTTP requests to HTTPS
        return 301 https://$host$request_uri;
    }

    # ─── HTTPS server (port 443) — main surveys.korafc.com app ────────────────
    server {
        listen 443 ssl http2;
        server_name surveys.korafc.com;

        ssl_certificate     /etc/nginx/certs/live/surveys.korafc.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/live/surveys.korafc.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── SSE (Server-Sent Events) — must NOT be buffered ──────────────────
        location /api/events/ {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;

            # Critical: disable all buffering so events flush immediately
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 86400s;   # 24 h — keep stream alive
            chunked_transfer_encoding on;
        }

        # ── API reverse proxy ─────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        # ── Angular PWA static files ──────────────────────────────────────────
        location / {
            root  /usr/share/nginx/html;
            index index.html;

            # SPA fallback: all routes served by index.html
            try_files $uri $uri/ /index.html;

            # Never cache index.html (fresh on every visit)
            location = /index.html {
                add_header Cache-Control "no-store, no-cache, must-revalidate";
                expires -1;
            }

            # Cache hashed static assets for 1 year
            location ~* \.(js|css|woff2?|ttf|svg|png|jpg|ico|webp)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}