events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Gzip compression for text assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # Hide Nginx version from error pages
    server_tokens off;

    upstream api_backend {
        server api:3000;
        keepalive 32;
    }

    # ─── HTTP server (port 80) ────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Redirect all HTTP to HTTPS once you have a certificate.
        # Uncomment when Let's Encrypt is configured:
        # return 301 https://$host$request_uri;

        # ── API reverse proxy ─────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        # ── Angular PWA static files ──────────────────────────────────────────
        location / {
            root  /usr/share/nginx/html;
            index index.html;

            # SPA fallback: all routes served by index.html
            try_files $uri $uri/ /index.html;

            # Never cache index.html (fresh on every visit)
            location = /index.html {
                add_header Cache-Control "no-store, no-cache, must-revalidate";
                expires -1;
            }

            # Cache hashed static assets for 1 year
            location ~* \.(js|css|woff2?|ttf|svg|png|jpg|ico|webp)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }

